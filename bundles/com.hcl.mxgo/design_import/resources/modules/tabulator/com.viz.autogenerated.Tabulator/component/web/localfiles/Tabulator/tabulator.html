<!DOCTYPE html>
<html>
  <head>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
    <script  type="text/javascript" src="tabulator.js"></script>
  </head>

  <body>
    <div>
      <div class="container mx-0 my-3">
       	<div class="row">
          <div class="col-3">
            <select id="filter-field" class="form-select form-select-sm" >
              <option></option>
            </select>
          </div>
        
          <div class="col-3">
          <input id="filter-value" type="text" class="form-control form-control-sm" placeholder="value to filter">
          </div>
        
          <div class="col">
          <button id="filter-clear" class="btn btn-sm btn-primary">Clear Filter</button>
          </div>
        </div>
       
      </div>
      <div id="tabulator-table"></div>
    </div>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
  </body>
 
</html>
